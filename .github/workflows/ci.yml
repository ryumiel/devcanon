name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      code: ${{ steps.filter.outputs.code }}
      markdown: ${{ steps.filter.outputs.markdown }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for changes
        id: filter
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = pull_request ]; then
            DIFF_RANGE="origin/${BASE_REF}...HEAD"
          else
            BEFORE="$BEFORE_SHA"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              echo "code=true" >> "$GITHUB_OUTPUT"
              echo "markdown=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            DIFF_RANGE="${BEFORE}..${CURRENT_SHA}"
          fi

          if git diff --name-only "$DIFF_RANGE" | grep -qvE '(^docs/|\.md$)'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

          if git diff --name-only "$DIFF_RANGE" | grep -qE '\.md$'; then
            echo "markdown=true" >> "$GITHUB_OUTPUT"
          else
            echo "markdown=false" >> "$GITHUB_OUTPUT"
          fi

  style-code:
    name: Style (Biome)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome format check
        run: pnpm run format:check

      - name: Biome lint
        run: pnpm run lint

  style-docs:
    name: Style (Markdown)
    needs: [changes]
    if: needs.changes.outputs.markdown == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Markdown format check
        run: pnpm run format:markdown:check

      - name: Markdown lint
        run: pnpm run lint:markdown

  build:
    name: TypeScript Build
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

  test:
    name: Tests (${{ matrix.os }})
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test

  ci-gate:
    name: CI Gate
    if: always()
    needs: [changes, style-code, style-docs, build, test]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Check results
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
