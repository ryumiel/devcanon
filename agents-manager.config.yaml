version: 1

library:
  skillsDir: ./skills
  agentsDir: ./agents
  generatedDir: ./generated

targets:
  claude:
    enabled: true
    skillsHome: ~/.claude/skills
    agentsHome: ~/.claude/agents
    installMode: symlink

  codex:
    enabled: true
    skillsHome: ~/.agents/skills
    agentsHome: ~/.codex/agents
    installMode: symlink

defaults:
  installMode: symlink
  overwritePolicy: overwrite-managed
  cleanManagedOutputs: true

platform:
  windowsSymlinkFallback: copy

manifest:
  path: ~/.agents-manager/manifest.json

modelTiers:
  fast:
    claude:
      model: claude-haiku-4-5
    codex:
      model: gpt-5.4-mini
  standard:
    claude:
      model: claude-sonnet-4-6
      effort: medium
    codex:
      model: gpt-5.4
      reasoning_effort: medium
  deep:
    claude:
      model: claude-opus-4-7
      effort: high
    codex:
      model: gpt-5.4
      reasoning_effort: high
