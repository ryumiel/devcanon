version: 2

library:
  skillsDir: ./skills
  agentsDir: ./agents
  generatedDir: ./generated

targets:
  claude:
    enabled: true
    skillsHome: ~/.claude/skills
    agentsHome: ~/.claude/agents
    installMode: symlink

  codex:
    enabled: true
    skillsHome: ~/.agents/skills
    agentsHome: ~/.codex/agents
    installMode: symlink
    skillDisplayNameSuffix: devcanon

defaults:
  installMode: symlink
  overwritePolicy: overwrite-managed
  cleanManagedOutputs: true

platform:
  windowsSymlinkFallback: copy

manifest:
  path: ~/.devcanon/manifest.json

capabilityProfiles:
  efficient:
    claude: claude-haiku-4-5-20251001
    codex: gpt-5.6-luna
  balanced:
    claude: claude-sonnet-5
    codex: gpt-5.6-terra
  frontier:
    claude: claude-opus-4-8
    codex: gpt-5.6-sol

toolNames:
  github-cli:
    claude: gh
    codex: gh

fileArtifacts:
  workflow-guide:
    claude: WORKFLOW.md
    codex: WORKFLOW.md
